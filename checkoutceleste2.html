<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saveur Céleste - Checkout</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            padding: 25px 20px;
        }

        /* Brand Header */
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .brand-name {
            font-size: 1.4rem;
            font-weight: 300;
            letter-spacing: 4px;
            text-transform: lowercase;
        }

        .brand-tagline {
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #888888;
            margin-top: 3px;
        }

        /* Page Title */
        .page-title {
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }

        .divider {
            height: 1px;
            background-color: #e0e0e0;
            margin-bottom: 30px;
        }

        /* Steps Indicator */
        .steps {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 0;
            margin-bottom: 40px;
            position: relative;
        }

        .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            flex: 1;
            position: relative;
        }

        /* Line between steps */
        .step:not(:last-child)::after {
            content: '';
            position: absolute;
            top: 18px;
            left: 60%;
            width: 80%;
            height: 1px;
            background-color: #e0e0e0;
            z-index: 0;
        }

        .step-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1.5px solid #cccccc;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 500;
            color: #aaaaaa;
            background: #ffffff;
            z-index: 1;
        }

        .step.active .step-circle {
            background-color: #000000;
            color: #ffffff;
            border-color: #000000;
        }

        .step-label {
            font-size: 0.7rem;
            color: #aaaaaa;
            text-align: center;
            letter-spacing: 0.3px;
            line-height: 1.4;
        }

        .step.active .step-label {
            color: #000000;
            font-weight: 500;
        }

        /* Form Fields */
        .form-section {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 35px;
        }

        .input-field {
            width: 100%;
            padding: 16px 18px;
            border: 1px solid #e0e0e0;
            border-radius: 10px;
            font-size: 0.9rem;
            color: #000000;
            background: #ffffff;
            outline: none;
            transition: border-color 0.2s;
            letter-spacing: 0.3px;
        }

        .input-field::placeholder {
            color: #aaaaaa;
            font-size: 0.85rem;
        }

        .input-field:focus {
            border-color: #000000;
        }

        /* Continue Button */
        .continue-btn {
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            border: none;
            border-radius: 25px;
            padding: 16px 20px;
            font-size: 0.95rem;
            font-weight: bold;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            margin-top: auto;
        }

        .continue-arrow {
            width: 28px;
            height: 28px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }
    </style>
</head>
<body>

    <div class="app-container">

        <!-- Brand Header -->
        <div class="brand-header">
            <div class="brand-name">saveur céleste</div>
            <div class="brand-tagline">artisan chocolatier</div>
        </div>

        <!-- Page Title -->
        <div class="page-title">Checkout</div>
        <div class="divider"></div>

        <!-- Steps -->
        <div class="steps">
            <div class="step active">
                <div class="step-circle">1</div>
                <div class="step-label">Fill in<br>information</div>
            </div>
            <div class="step">
                <div class="step-circle">2</div>
                <div class="step-label">Shipping<br>Information</div>
            </div>
            <div class="step">
                <div class="step-circle">3</div>
                <div class="step-label">Confirm</div>
            </div>
        </div>

        <!-- Form -->
        <form id="checkoutForm" onsubmit="handleFormSubmit(event)">
            <div class="form-section">
                <input class="input-field" type="text" placeholder="First Name" id="firstName">
                <input class="input-field" type="text" placeholder="Last Name" id="lastName">
                <input class="input-field" type="tel" placeholder="Phone" id="phone">
                <input class="input-field" type="tel" placeholder="Phone 2 (optional)" id="phone2">
                <input class="input-field" type="text" placeholder="@instagram" id="instagram">
            </div>
                <!-- <button type="submit" class="continue-btn">
                    <span>Continue  </span>
                    <span class="continue-arrow">→</span> -->
                <!-- Continue Button -->
                <button type="button" class="continue-btn" id="continueBtn" >
                    Continue
                    <span class="continue-arrow">→</span>
                </button>
        </form>

    </div> 

    <script>
        document.getElementById('continueBtn').addEventListener('click', function() {
            const checkoutdata = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                instagram: document.getElementById('instagram').value.trim()
            };
            if (!checkoutdata.firstName || !checkoutdata.lastName || !checkoutdata.phone) {
                alert('Please fill in all required fields.');
                return;
            }
            localStorage.setItem('customerInfo', JSON.stringify(checkoutdata));
            
            // Here you can add form validation if needed
             window.location.href = 'confirmceleste2.html';
        });
      

    </script>
</body>
