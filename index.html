
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saveur Céleste</title>
    <style>
        html {
            scroll-behavior: smooth;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #ffffff;
            color: #000000;
            display: flex;
            justify-content: center;
        }

        /* Container simulating the mobile mockup dimensions */
        .app-container {
            width: 100%;
            max-width: 450px;
            min-height: 100vh;
            border: 1px solid #eaeaea;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Top Brand Header */
        .brand-header {
            width: 100%;
            text-align: center;
            padding: 15px 0;
            font-size: 1.1rem;
            font-weight: 400;
            letter-spacing: 2px;
            border-bottom: 1px solid #f5f5f5;
            text-transform: lowercase;
        }

        /* Hero Video Section */
        .hero {
            position: relative;
            width: 100%;
            height: 480px;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 30px 25px;
        }

        .hero-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.1) 40%, rgba(0,0,0,0.4) 100%);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            color: #ffffff;
            width: 100%;
        }

        .hero-content h1 {
            font-size: 1.4rem;
            font-weight: bold;
            letter-spacing: 1px;
            margin-bottom: 12px;
            text-transform: uppercase;
            line-height: 1.3;
        }

        .hero-content p {
            font-size: 0.75rem;
            letter-spacing: 1px;
            line-height: 1.5;
            margin-bottom: 20px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        .hero-btn {
            display: inline-block;
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 10px 24px;
            text-decoration: none;
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Content Section */
        .main-content {
            padding: 35px 25px;
        }

        .section-title {
            font-size: 1.6rem;
            font-weight: 300;
            letter-spacing: 1px;
            margin-bottom: 25px;
        }

        /* Single Article Row Style matching original layout */
        .articles-row {
            display: flex;
            gap: 15px;
            overflow-x: hidden;
        }

        .article-card {
            width: 85%;
            flex-shrink: 0;
            text-decoration: none;
            color: inherit;
        }

        .article-image {
            width: 100%;
            height: 320px;
            object-fit: cover;
        }

        .article-info {
            padding-top: 12px;
            text-align: center;
        }

        .article-title {
            font-size: 0.75rem;
            font-weight: bold;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 6px;
        }

        .article-date {
            font-size: 0.7rem;
            color: #777777;
            letter-spacing: 0.5px;
        }

        /* Simulated next card peek to match original composition */
        .peek-card {
            width: 15%;
            flex-shrink: 0;
            background-color: #eaeaea;
            height: 320px;
            opacity: 0.4;
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <!-- Brand Header Section -->
        <div class="brand-header">
            saveur céleste
        </div>

        <!-- Hero Section with Background Video -->
        <header class="hero">
            <video class="hero-video" autoplay loop muted playsinline>
                <source src="saveur.mp4" type="video/mp4">
            </video>
            <div class="hero-overlay"></div>
            <div class="hero-content">
                <h1>The Art of <br>saveur céleste</h1>
                <p>Eveillez vos sens avec nos bouquets en chocolat inedits et nos savoureuses tartelettes maison</p>
                <a href="#articles-section" class="hero-btn">Shop Now</a>
            </div>
        </header>

        <!-- Articles Section -->
        <main class="main-content">
            <h2 class="section-title" id="articles-section">Articles</h2>
            
            <div class="articles-row">
                <!-- Single Active Article -->
                <a href="shopceleste.html" class="article-card">
                    <img src="bouquet1.jpg" alt="Article Thumbnail" class="article-image">
                    <div class="article-info">
                        <h3 class="article-title">bouquet de fleur en chocolat</h3>
                        <div class="article-date">l'Éphémère beauté d'un bouquet céleste</div>
                    </div>
                </a>

                <!-- Visual placeholder of the cutoff layout item from your original image -->
                <div class="peek-card"></div>
            </div>
             <div class="articles-row">
                <!-- Single Active Article -->
                <a href="shoceleste2.html" class="article-card">
                    <img src="tarts.jpg" alt="Article Thumbnail" class="article-image">
                    <div class="article-info">
                        <h3 class="article-title">berry blush tarts</h3>
                        <div class="article-date">une douceur divine a chaque bouchee</div>
                    </div>
                </a>

                <!-- Visual placeholder of the cutoff layout item from your original image -->
                <div class="peek-card"></div>
            </div>
        </main>

    </div>

</body>
</html>
